[workspace]
preview = ["pixi-build"]
authors = [
    "David Perez-Saura <perezsaura.david@gmail.com>",
    "Miguel Fernandez-Cortizas <TBD>",
    "Alvaro Gaona <alvgaona@gmail.com>"
]
name = "as2-semantic-slam"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]


[tasks]
evo-traj = { cmd = "sh -c 'evo_traj bag2 \"$0\" /glim_ros_node/odom --ref /lidarodom/ground_truth/pose --plot -a'", env = { QT_QPA_PLATFORM_PLUGIN_PATH = "$CONDA_PREFIX/lib/python3.11/site-packages/PyQt6/Qt6/plugins/platforms" } }
evo-ape = { cmd = "sh -c 'evo_ape bag2 \"$0\" /lidarodom/ground_truth/pose /lidarodom/pose -a'", env = { QT_QPA_PLATFORM_PLUGIN_PATH = "$CONDA_PREFIX/lib/python3.11/site-packages/PyQt6/Qt6/plugins/platforms" } }
evo-rpe = { cmd = "sh -c 'evo_rpe bag2 \"$0\" /lidarodom/ground_truth/pose /lidarodom/pose -a'", env = { QT_QPA_PLATFORM_PLUGIN_PATH = "$CONDA_PREFIX/lib/python3.11/site-packages/PyQt6/Qt6/plugins/platforms" } }

[dependencies]
pandas = ">=3.0.1,<4"
numpy = ">=2.4.3,<3"
scipy = ">=1.17.1,<2"
pyyaml = ">=6.0.3,<7"
opencv = ">=4.13.0,<5"
py-opencv = ">=4.13.0,<5"
tqdm = ">=4.67.3,<5"
ros-humble-ros2run = ">=0.18.17,<0.19"
evo = ">=1.34.3,<2"
pyqt6 = ">=6.8.1,<7"
ros-humble-plotjuggler-ros = ">=2.3.1,<3"
ros-humble-rosbag2-storage-mcap = ">=0.15.16,<0.16"

[feature.humble]
channels = ["robostack-humble"]

[feature.humble.dependencies]
ros-humble-ros2cli = ">=0.18.17,<0.19"
ros-humble-ros2launch = ">=0.19.13,<0.20"
ros-humble-ros2topic = ">=0.18.17,<0.19"
drone_racing_msgs = { path = "drone-racing-msgs/drone_racing_msgs" }
ros-humble-dual-pose-graph = { path = "dual_pose_graph" }
ros-humble-rosbag2-storage-mcap = ">=0.15.16,<0.16"
ros-humble-rosbag2 = ">=0.15.16,<0.16"

[environments]
default = ["humble"]
